<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login & signup page</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="card">
        <!-- left side form  -->
        <!-- sign up form  -->
        <div class="form-panel">
            <h2>Get Started Now</h2>

            <div class="form-group">
                <label> Name</label>
                <input type="text" placeholder="Enter Your name" />
            </div>

            <div class="form-group">
                <label>Email address </label>
                <input type="email" placeholder="Enter your email" />
            </div>

            <div class="form-group">
                <label>Password </label>
                <input type="password" placeholder="Enter your password" />
            </div>

            <button class="btn">signup</button>
            <div class="divider">
                <span> or </span>
            </div>
            <div class="social-btns">
                <button class="btn-social">
                    <img src="https://www.google.com/favicon.ico" alt="google" width="18" height="18" />
                    Sign in with Google
                </button>
                <button class="btn-social">
                    <img src="https://www.apple.com/favicon.ico" alt="Apple" width="18" height="18" />
                    Sign in with Apple
                </button>
            </div>

            <p class="signin-text">Have an account <a href="#">Sign in</a></p>
        </div>
        <!-- end signup form   -->

        <!-- login form  -->

        <div class="login-form">
            <h2>Welcome Back</h2>
            <p class="subtitle">Enter your credentials to access your account</p>
            <div class="form-group">
                <label>Email address</label>
                <input type="email" placeholder="Enter your email" />
            </div>

            <div class="form-group">
                <label> Password</label>
                <input type="password" placeholder="Enter your password" />
            </div>
            <button class="btn">login</button>
            <div class="divider">
                <span>or</span>
            </div>

            <div class="social-btns">
                <button class="btn-social">
                    <img src="https://www.google.com/favicon.ico" alt="google" width="18" height="18" />
                    Sign in with Google
                </button>
                <button class="btn-social">
                    <img src="https://www.apple.com/favicon.ico" alt="apple" width="18" height="18" />
                    Sign in with Apple
                </button>
                <p class="signin-text">
                    Don't have an account?
                    <a href="#" id="go-signup"> sign Up </a>
                </p>
            </div>
        </div>
        <!-- right side image  -->

        <div class="image-panel">
            <img src="./imgs/chris-lee-70l1tDAI6rM-unsplash 1.png" alt="plant image" width="782" height="1042" />
        </div>
    </div>
</body>

</html>
